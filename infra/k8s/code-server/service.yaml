apiVersion: v1
kind: Service
metadata:
  name: code-server-${APP_SLUG}
  namespace: ranepa-tools
  labels:
    app: code-server
    slot: ${APP_SLUG}
spec:
  type: ClusterIP
  selector:
    app: code-server
    slot: ${APP_SLUG}
  ports:
    # targetPort 8080 — nginx-sidecar (даёт /mobile + проксирует ttyd),
    # не сам ttyd:7681. Desktop-путь работает через nginx прозрачно.
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
