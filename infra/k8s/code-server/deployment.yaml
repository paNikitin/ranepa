# Deployment одного code-server-pod'а под слот ${APP_SLUG}.
# Запуск: APP_SLUG=app1 envsubst < deployment.yaml | kubectl apply -f -
#
# Что должно существовать в namespace ranepa-tools ДО apply:
#   secret claude-credentials   (key=credentials.json) — OAuth-токен Claude
#   secret kubeconfig-${APP_SLUG} (key=config) — generated by gen-kubeconfigs.sh
#   secret github-deploy-key    (key=id_ed25519) — для git push (опционально)
#
# Образ code-server должен быть собран и запушен в Harbor:
#   docker build -t harbor.parsers360.ru:10443/ranepa/code-server:0.1.0 -f infra/code-server/Dockerfile .
#   docker push harbor.parsers360.ru:10443/ranepa/code-server:0.1.0

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: code-server-${APP_SLUG}-data
  namespace: ranepa-tools
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-server-${APP_SLUG}
  namespace: ranepa-tools
  labels:
    app: code-server
    slot: ${APP_SLUG}
spec:
  replicas: 1
  strategy:
    type: Recreate            # PVC RWO + один pod
  selector:
    matchLabels:
      app: code-server
      slot: ${APP_SLUG}
  template:
    metadata:
      labels:
        app: code-server
        slot: ${APP_SLUG}
    spec:
      imagePullSecrets:
        - name: harbor-creds-ranepa
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: code-server
          image: harbor.parsers360.ru:10443/ranepa/code-server:0.1.0
          imagePullPolicy: Always
          env:
            - name: APP_SLUG
              value: "${APP_SLUG}"
            - name: HOME
              value: "/home/coder"
          ports:
            - name: ttyd
              containerPort: 7681
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: data
              mountPath: /home/coder/work
            - name: claude-creds
              mountPath: /home/coder/.claude/.credentials.json
              subPath: credentials.json
              readOnly: true
            - name: kubeconfig
              mountPath: /home/coder/.kube/config
              subPath: config
              readOnly: true
            - name: docker-sock
              mountPath: /var/run/docker.sock
          readinessProbe:
            tcpSocket: { port: 7681 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 7681 }
            initialDelaySeconds: 30
            periodSeconds: 60

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: code-server-${APP_SLUG}-data
        - name: claude-creds
          secret:
            secretName: claude-credentials
            defaultMode: 0400
        - name: kubeconfig
          secret:
            secretName: kubeconfig-${APP_SLUG}
            defaultMode: 0400
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
