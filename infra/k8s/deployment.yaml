# Deployment одного слота. Применяется в namespace ranepa-${APP_SLUG}.
# scripts/deploy.sh подменяет ${APP_SLUG} и ${VERSION} через envsubst
# и пайпит в kubectl apply.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ranepa-app
  namespace: ranepa-${APP_SLUG}
  labels:
    app: ranepa-app
    slot: ${APP_SLUG}
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: ranepa-app
  template:
    metadata:
      labels:
        app: ranepa-app
        slot: ${APP_SLUG}
    spec:
      imagePullSecrets:
        - name: harbor-creds-ranepa
      containers:
        - name: app
          image: harbor.parsers360.ru:10443/ranepa/${APP_SLUG}:${VERSION}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 2
            periodSeconds: 10
