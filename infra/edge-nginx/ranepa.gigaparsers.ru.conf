# ranepa.gigaparsers.ru — edge nginx server block.
#
# Lives inside container `prom_nginx_1` (image paulnik/nginx:main) on
# 5.188.118.125, mounted from /etc/nginx/conf.d/ranepa.gigaparsers.ru.conf
# via `docker cp`. Reload — `nginx -s reload` inside the container.
#
# IMPORTANT: this config is only inside the running container. The image
# `paulnik/nginx:main` is rebuilt from
# /root/gigaparser/giga_parser/standalone/nginx/nginx.conf — when someone
# next runs build_push.sh + docker-compose up, this file will be lost.
# When that day comes, merge the contents of THIS file into the source
# nginx.conf in the gigaparser repo.
#
# Architecture mirrors naisty-look.gigaparsers.ru (see existing block in
# default.conf inside the container): edge nginx terminates TLS, proxies
# HTTPS to traefik 10.43.58.167:10443 with proxy_ssl_verify off (traefik
# presents its default self-signed cert for unknown SNI).

# WebSocket support: ttyd на /dev/app<N> требует Upgrade/Connection
# заголовков. Nginx по умолчанию проксирует HTTP/1.1 без upgrade'а;
# нужно явно прокинуть заголовок и поднять таймауты, иначе клиент
# видит «Press ⏎ to Reconnect» через ~20 секунд.
# `map` живёт в http{} контексте — этот файл инклудится туда напрямую.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name ranepa.gigaparsers.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 307 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ranepa.gigaparsers.ru;

    ssl_certificate     /etc/letsencrypt/live/ranepa.gigaparsers.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ranepa.gigaparsers.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    keepalive_timeout 75s;
    keepalive_requests 100;
    client_max_body_size 25m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass https://10.43.58.167:10443;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_name $host;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket upgrade (для ttyd на /dev/app<N> и SSE-стримов).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
