<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Вайбкодинг — терминал</title>
    <style>
      :root {
        --navy: #1f293b;
        --navy-2: #161616;
        --cyan: #31bdd9;
        --ice: #a9b8ce;
        --bar-h: 100px;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        background: var(--navy-2);
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        -webkit-text-size-adjust: 100%;
      }
      /* iframe с ttyd. Высоту считаем в JS под visualViewport,
         чтобы терминал не уезжал под клавиатуру/панель. */
      #term {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        border: 0;
        display: block;
      }
      /* Панель быстрых клавиш — два ряда, кнопки тянутся на всю
         ширину (без горизонтального скролла). position: fixed +
         transform по visualViewport — иначе на iOS прячется под
         клавиатурой (Safari не сжимает layout viewport). */
      #bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: var(--bar-h);
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 6px;
        background: var(--navy);
        border-top: 1px solid #394758;
        will-change: transform;
        z-index: 10;
      }
      #bar .row {
        display: flex;
        gap: 6px;
        flex: 1;
      }
      #bar button {
        flex: 1 1 0;
        min-width: 0;
        border: 1px solid #394758;
        border-radius: 10px;
        background: #233044;
        color: var(--ice);
        font-size: 15px;
        font-weight: 600;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
        transition: background 60ms, color 60ms, transform 60ms;
      }
      /* Явный фидбэк нажатия — класс вешается на touchstart. */
      #bar button.pressed {
        background: var(--cyan);
        color: var(--navy);
        transform: scale(0.93);
      }
    </style>
  </head>
  <body>
    <iframe id="term" title="terminal"></iframe>

    <nav id="bar" aria-label="Быстрые клавиши">
      <div class="row">
        <button data-k="Escape" data-c="27">Esc</button>
        <button data-k="Tab" data-code="Tab" data-c="9">Tab</button>
        <button data-k="Tab" data-code="Tab" data-c="9" data-shift="1">⇧Tab</button>
        <button data-k="c" data-c="67" data-ctrl="1">Ctrl-C</button>
        <button data-k="d" data-c="68" data-ctrl="1">Ctrl-D</button>
      </div>
      <div class="row">
        <button data-k="ArrowLeft"  data-c="37">←</button>
        <button data-k="ArrowUp"    data-c="38">↑</button>
        <button data-k="ArrowDown"  data-c="40">↓</button>
        <button data-k="ArrowRight" data-c="39">→</button>
        <button data-k="Enter" data-c="13">⏎</button>
      </div>
    </nav>

    <script>
      var iframe = document.getElementById("term");
      var bar = document.getElementById("bar");

      // iframe указывает на сам ttyd — родительский путь без /mobile.
      iframe.src = location.pathname.replace(/mobile\/?$/, "");

      // ── Раскладка под visualViewport ───────────────────────────────
      // iOS Safari при открытой клавиатуре НЕ сжимает layout viewport,
      // поэтому fixed-панель прячется под клавиатурой. visualViewport
      // даёт реальную видимую область — двигаем панель и iframe по ней.
      var vv = window.visualViewport;

      function layout() {
        var h = vv ? vv.height : window.innerHeight;
        var offTop = vv ? vv.offsetTop : 0;
        var barH = bar.offsetHeight;
        // Панель — на нижней кромке ВИДИМОЙ области (над клавиатурой).
        var barTop = offTop + h - barH;
        bar.style.transform = "translateY(" + (barTop - (window.innerHeight - barH)) + "px)";
        // iframe — занимает видимую область минус панель.
        iframe.style.height = (h - barH) + "px";
        iframe.style.transform = "translateY(" + offTop + "px)";
      }

      if (vv) {
        vv.addEventListener("resize", layout);
        vv.addEventListener("scroll", layout);
      }
      window.addEventListener("resize", layout);
      window.addEventListener("orientationchange", function () {
        setTimeout(layout, 200);
      });
      layout();
      // Раскладка может «доезжать» — пара отложенных пересчётов.
      setTimeout(layout, 300);
      setTimeout(layout, 1000);

      // ── Терминал внутри iframe ─────────────────────────────────────
      function termTextarea() {
        try {
          var doc = iframe.contentDocument || iframe.contentWindow.document;
          return (
            doc.querySelector(".xterm-helper-textarea") ||
            doc.querySelector("textarea")
          );
        } catch (e) {
          return null;
        }
      }

      function sendKey(opts) {
        var ta = termTextarea();
        if (!ta) return;
        ta.focus();
        var init = {
          key: opts.key,
          code: opts.code || opts.key,
          keyCode: opts.keyCode,
          which: opts.keyCode,
          ctrlKey: !!opts.ctrl,
          shiftKey: !!opts.shift,
          bubbles: true,
          cancelable: true,
        };
        ta.dispatchEvent(new KeyboardEvent("keydown", init));
        ta.dispatchEvent(new KeyboardEvent("keyup", init));
      }

      // ── Кнопки: фидбэк на touchstart, действие на touchend/click ──
      function press(btn) {
        btn.classList.add("pressed");
      }
      function release(btn) {
        setTimeout(function () { btn.classList.remove("pressed"); }, 120);
      }
      function fire(btn) {
        sendKey({
          key: btn.dataset.k,
          code: btn.dataset.code,
          keyCode: parseInt(btn.dataset.c, 10),
          ctrl: btn.dataset.ctrl === "1",
          shift: btn.dataset.shift === "1",
        });
      }

      bar.querySelectorAll("button").forEach(function (btn) {
        // touchstart — мгновенная подсветка + действие (без 300ms delay).
        btn.addEventListener("touchstart", function (e) {
          e.preventDefault();           // не даём фокусу уйти с терминала
          press(btn);
          fire(btn);
        }, { passive: false });
        btn.addEventListener("touchend", function () { release(btn); });
        btn.addEventListener("touchcancel", function () { release(btn); });
        // Фолбэк для десктопа/мыши.
        btn.addEventListener("click", function (e) {
          if (e.detail === 0) return;   // synthetic от touch — пропускаем
          press(btn);
          fire(btn);
          release(btn);
        });
      });

      // После загрузки ttyd — фокус на терминал (поднять клавиатуру).
      iframe.addEventListener("load", function () {
        setTimeout(function () {
          var ta = termTextarea();
          if (ta) ta.focus();
          layout();
        }, 400);
      });
    </script>
  </body>
</html>
