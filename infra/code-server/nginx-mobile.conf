# nginx-sidecar для code-server-pod'а.
#   /mobile/  → статическая обёртка (iframe ttyd + панель клавиш для телефона)
#   /         → проксирование в ttyd (127.0.0.1:7681), как было
#
# Кладётся в ConfigMap code-server-web вместе с mobile.html, см.
# infra/k8s/code-server/README.md. Service слота смотрит на :8080.
server {
    listen 8080;
    server_name _;

    # Мобильная обёртка — iframe + панель клавиш Esc/Tab/стрелки/Ctrl.
    location = /mobile  { return 302 /mobile/; }
    location = /mobile/ {
        root /usr/share/nginx/html;
        try_files /mobile.html =404;
        add_header Cache-Control "no-cache";
    }

    # Всё остальное (включая WebSocket /ws ttyd) — без изменений.
    location / {
        proxy_pass http://127.0.0.1:7681;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
