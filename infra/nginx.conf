# Static SPA на nginx внутри контейнера. Путь корня — / (внутри пода);
# наружный edge-nginx уже маршрутизирует /app<N>/* сюда. Если приложение
# собрано с base=/app1/, его vite-сборка ожидает что URL'ы вида
# /app1/assets/*.js придут на этот сервер с уже срезанным префиксом
# Traefik'ом (StripPrefix middleware) — поэтому здесь раздаём с корня.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # API sidecar (FastAPI на 127.0.0.1:8000). Браузер пользователя
    # стучится в /api/* → попадает сюда → в FastAPI sidecar.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;        # streaming multipart upload
        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
